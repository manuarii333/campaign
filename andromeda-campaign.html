const WORKER_BASE = 'https://payzen-hcs.highcoffeeshirt.workers.dev';
let adminSecret = sessionStorage.getItem('hcs_admin_secret') || '';
let ordersFilter = 'all';
let ordersData = [];

function setNavActive(id) {
  document.querySelectorAll('.camp-item,.sidebar-action').forEach(el=>el.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
}

function showOrders() {
  setNavActive('nav-orders');
  const ws = document.getElementById('workspace');
  if (!adminSecret) {
    ws.innerHTML = `
      <div class="orders-login">
        <h3>🔐 Espace Admin</h3>
        <p>Entrez votre secret administrateur pour accéder aux commandes.</p>
        <input class="finput" id="admin-secret-input" type="password" placeholder="Secret admin" style="margin-bottom:10px">
        <button class="btn btn-primary" style="width:100%" onclick="loginAdmin()">Se connecter</button>
        <div id="admin-login-err" style="color:#ff6b6b;font-size:0.75rem;margin-top:8px;display:none"></div>
      </div>`;
    return;
  }
  loadOrders(false);
}

async function loginAdmin() {
  const val = document.getElementById('admin-secret-input')?.value.trim();
  if (!val) return;
  const res = await fetch(`${WORKER_BASE}/admin/db/orders?archived=0`, {
    headers: { 'X-Admin-Secret': val }
  });
  if (res.ok) {
    adminSecret = val;
    sessionStorage.setItem('hcs_admin_secret', val);
    requestNotifPermission();
    startOrderPolling();
    loadOrders(false);
  } else {
    document.getElementById('admin-login-err').style.display = 'block';
    document.getElementById('admin-login-err').textContent = '❌ Secret incorrect.';
  }
}

async function loadOrders(archived=false) {
  const ws = document.getElementById('workspace');
  ws.innerHTML = `<div class="orders-view"><div style="color:var(--text-secondary);font-size:0.85rem;padding:40px;text-align:center">Chargement…</div></div>`;
  try {
    const archParam = archived ? '1' : '0';
    const res = await fetch(`${WORKER_BASE}/admin/db/orders?archived=${archParam}`, {
      headers: { 'X-Admin-Secret': adminSecret }
    });
    if (!res.ok) { adminSecret=''; sessionStorage.removeItem('hcs_admin_secret'); showOrders(); return; }
    const data = await res.json();
    ordersData = data.orders || [];
    renderOrdersView(ordersData, archived);
  } catch(e) {
    ws.innerHTML = `<div class="orders-view"><div style="color:#ff6b6b;padding:40px;text-align:center">Erreur réseau : ${e.message}</div></div>`;
  }
}

function renderOrdersView(orders, archived=false) {
  const ws = document.getElementById('workspace');
  const statuses = ['all','pending','paid','processing','delivered','cancelled'];
  const statusLabels = {all:'Toutes',pending:'En attente',paid:'Payées',processing:'En cours',delivered:'Livrées',cancelled:'Annulées'};
  const statusIcons = {pending:'⏳',paid:'✅',processing:'🔄',delivered:'📦',cancelled:'❌',archived:'🗃️'};

  const visible = ordersFilter==='all' ? orders : orders.filter(o=>o.status===ordersFilter);

  ws.innerHTML = `
    <div class="orders-view">
      <div class="orders-head">
        <div>
          <div class="orders-title">${archived?'🗃️ Commandes archivées':'📦 Gestion des commandes'}</div>
          <div style="font-size:0.7rem;color:var(--text-secondary);margin-top:2px">${orders.length} commande${orders.length>1?'s':''} · Worker HCS</div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${!archived?`<button class="btn btn-outline" style="font-size:0.72rem" onclick="showArchive()">🗃️ Archives</button>`:''}
          <button class="btn btn-outline" style="font-size:0.72rem" onclick="loadOrders(${archived})">🔄 Rafraîchir</button>
          <button class="btn btn-outline" style="font-size:0.72rem;color:#ff6b6b" onclick="adminSecret='';sessionStorage.removeItem('hcs_admin_secret');showOrders()">Déconnexion</button>
          <button class="btn btn-primary" style="font-size:0.72rem" onclick="exportOrdersCSV()">⬇️ CSV</button>
        </div>
      </div>
      ${!archived?`<div class="orders-filters">
        ${statuses.map(s=>`<button class="filter-btn ${ordersFilter===s?'active':''}" onclick="ordersFilter='${s}';renderOrdersView(ordersData.filter(o=>o.status!=='archived'),false)">${statusLabels[s]}</button>`).join('')}
      </div>`:''}
      ${visible.length===0
        ? `<div style="text-align:center;color:var(--text-secondary);padding:60px;font-size:0.85rem">Aucune commande${ordersFilter!=='all'?' pour ce filtre':''}.</div>`
        : `<table class="order-table">
          <thead><tr>
            <th>Référence</th><th>Date</th><th>Campagne</th><th>Produit</th><th>Montant</th><th>Statut</th><th>Actions</th>
          </tr></thead>
          <tbody>
            ${visible.map(o=>`
              <tr>
                <td><code style="font-size:0.68rem;color:var(--accent)">${o.orderId}</code></td>
                <td style="color:var(--text-secondary)">${new Date(o.createdAt).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
                <td>${o.campaignName||'—'}</td>
                <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${o.product||''}">${o.product||'—'}</td>
                <td style="font-weight:700;color:var(--accent-3)">${(o.amount||0).toLocaleString('fr-FR')} ${o.currency||'XPF'}</td>
                <td><span class="status-badge s-${o.status||'pending'}">${statusIcons[o.status]||''} ${o.status||'pending'}</span></td>
                <td>
                  <select class="status-select" onchange="updateOrderStatus('${o.orderId}',this.value)">
                    <option value="">— Statut</option>
                    <option value="pending">⏳ En attente</option>
                    <option value="paid">✅ Payée</option>
                    <option value="processing">🔄 En cours</option>
                    <option value="delivered">📦 Livrée</option>
                    <option value="cancelled">❌ Annulée</option>
                    <option value="archived">🗃️ Archiver</option>
                  </select>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>`}
    </div>`;
}

async function updateOrderStatus(orderId, status) {
  if (!status) return;
  try {
    if (status === 'archived') {
      const res = await fetch(`${WORKER_BASE}/admin/db/archive`, {
        method: 'POST',
        headers: { 'Content-Type':'application/json','X-Admin-Secret':adminSecret },
        body: JSON.stringify({ orderId })
      });
      if (!res.ok) throw new Error('Erreur archivage');
    } else {
      const res = await fetch(`${WORKER_BASE}/admin/db/order`, {
        method: 'PATCH',
        headers: { 'Content-Type':'application/json','X-Admin-Secret':adminSecret },
        body: JSON.stringify({ orderId, status })
      });
      if (!res.ok) throw new Error('Erreur mise à jour');
    }
    await loadOrders(status==='archived');
  } catch(e) { alert('Erreur : ' + e.message); }
}

function showArchive() {
  setNavActive('nav-archive');
  if (!adminSecret) { showOrders(); return; }
  loadOrders(true);
}

function showLPs() {

async function loadLPs() {

function renderLPs(pages) {
  const ws = document.getElementById('workspace');
  const cards = pages.map(p => {
    const thumbUrl = `${WORKER_BASE}/thumb/${p.slug}?t=${Date.now()}`;

    // Trouver la campagne correspondante pour afficher la vignette FB
    const camp = CAMPS.find(c => {
      const s = c.name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
      return s === p.slug || (p.campaignName && p.campaignName === c.name);

    const vignette = camp ? `
      <div style="position:relative;height:110px;background:${camp.heroGrad};overflow:hidden;border-bottom:1px solid #2a2a4a;flex-shrink:0">
        <div style="position:absolute;inset:0;background:${camp.colors.overlay}"></div>
        <div style="position:relative;z-index:2;padding:10px;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center">
          <div style="font-size:0.62rem;font-weight:900;color:white;line-height:1.2;text-shadow:0 1px 4px rgba(0,0,0,.7)">${camp.headline}</div>
          <div style="display:inline-block;margin-top:5px;background:${camp.colors.badge};color:white;padding:2px 8px;border-radius:10px;font-size:0.52rem;font-weight:700">${camp.badge}</div>
        </div>
        <div style="position:absolute;top:5px;right:6px;background:rgba(0,0,0,.5);border-radius:4px;padding:2px 5px;font-size:0.52rem;color:#fff;font-weight:700">FB AD</div>
      </div>` : `
      <div style="height:110px;background:#0f0f1a;display:flex;align-items:center;justify-content:center;font-size:2rem;border-bottom:1px solid #2a2a4a">🌐</div>`;

    return `<div style="background:#1a1a2e;border:1px solid #2a2a4a;border-radius:12px;overflow:hidden;display:flex;flex-direction:column">
      ${vignette}
      <div style="position:relative;height:120px;background:#0f0f1a;overflow:hidden">
        <img src="${thumbUrl}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div style="display:none;align-items:center;justify-content:center;height:100%;font-size:0.7rem;color:#9090b0">Aperçu LP</div>
        <div style="position:absolute;bottom:4px;left:6px;background:rgba(0,0,0,.6);border-radius:4px;padding:2px 6px;font-size:0.52rem;color:#fff">LP</div>
      </div>
      <div style="padding:12px;flex:1;display:flex;flex-direction:column;gap:6px">
        <div style="font-weight:700;font-size:0.85rem">${p.campaignName || p.slug}</div>
        <div style="font-size:0.65rem;color:var(--text-secondary)">Publié : ${date}</div>
        <code style="font-size:0.58rem;color:#43e97b;word-break:break-all">${p.url || ''}</code>
        <div style="display:flex;gap:6px;margin-top:auto">
          <a href="${p.url}" target="_blank" style="flex:1;text-align:center;padding:6px;background:#6c63ff;color:white;border-radius:6px;font-size:0.7rem;font-weight:700;text-decoration:none">🌐 Ouvrir</a>
          <button onclick="navigator.clipboard.writeText('${p.url}');showToast('✅ Copié !')" style="flex:1;padding:6px;background:#1e1e3a;border:1px solid #2a2a4a;color:#ccc;border-radius:6px;font-size:0.7rem;cursor:pointer">📋 Copier</button>
          <button onclick="deleteLP('${p.slug}')" style="padding:6px 10px;background:rgba(255,107,107,.15);border:1px solid #ff6b6b;color:#ff6b6b;border-radius:6px;font-size:0.7rem;cursor:pointer">🗑️</button>
        </div>

  }).join('');

  ws.innerHTML = `<div class="orders-view">
    <div class="orders-head">
      <div>
        <div class="orders-title">🌐 LPs publiées</div>
        <div style="font-size:0.7rem;color:var(--text-secondary);margin-top:2px">${pages.length} page${pages.length>1?'s':''} en ligne · Worker HCS</div>
      </div>
      <button class="btn btn-outline" style="font-size:0.72rem" onclick="loadLPs()">🔄 Rafraîchir</button>
    </div>
    ${pages.length === 0
      ? `<div style="text-align:center;color:var(--text-secondary);padding:60px">Aucune LP publiée. Utilise 🚀 Publier sur une campagne.</div>`
      : `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;padding:4px 0">${cards}</div>`}
  </div>`;
}

async function deleteLP(slug) {
  if (!confirm(`Supprimer la LP "${slug}" ?`)) return;
  try {
    await fetch(`${WORKER_BASE}/lp/${slug}`, { method:'DELETE', headers:{'X-Admin-Secret':adminSecret} });
    showToast(`🗑️ LP "${slug}" supprimée`);
    loadLPs();
  } catch(e) { showToast('❌ ' + e.message, true); }
}

function exportOrdersCSV() {
  const headers = 'Référence,Date,Campagne,Produit,Montant,Devise,Statut,Client,Email,Livraison';
  const rows = ordersData.map(o => [
    o.orderId,
    new Date(o.createdAt).toLocaleDateString('fr-FR'),
    o.campaignName||'',
    (o.product||'').replace(/,/g,';'),
    o.amount||0,
    o.currency||'XPF',
    o.status||'',
    (o.client?.name||'').replace(/,/g,';'),
    o.client?.email||'',
    o.delivery?.type||''
  ].join(',')).join('\n');
  dl('hcs-commandes-'+new Date().toISOString().slice(0,10)+'.csv', headers+'\n'+rows, 'text/csv');
}

async function trackOrder() {
  const id = document.getElementById('track-input')?.value.trim();

  if (!id) return;
  resultEl.style.display = 'block';
  resultEl.innerHTML = '<div style="text-align:center;color:var(--text-secondary);padding:14px;font-size:0.8rem">Recherche…</div>';
  try {
    const res = await fetch(`${WORKER_BASE}/order/status?id=${encodeURIComponent(id)}`);
    if (!res.ok) { resultEl.innerHTML='<div style="color:#ff6b6b;padding:14px;text-align:center;font-size:0.8rem">❌ Commande introuvable.</div>'; return; }
    const o = await res.json();
    const statusIcons = {pending:'⏳',paid:'✅',processing:'🔄',delivered:'📦',cancelled:'❌'};
    const statusLabels = {pending:'En attente',paid:'Payée',processing:'En cours',delivered:'Livrée',cancelled:'Annulée'};
    resultEl.innerHTML = `
      <div class="track-row"><span class="track-label">Référence</span><span class="track-val" style="color:var(--accent)">${o.orderId}</span></div>
      <div class="track-row"><span class="track-label">Date</span><span class="track-val">${new Date(o.createdAt).toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'})}</span></div>
      <div class="track-row"><span class="track-label">Produit</span><span class="track-val">${o.product||'—'}</span></div>
      <div class="track-row"><span class="track-label">Montant</span><span class="track-val" style="color:var(--accent-3)">${(o.amount||0).toLocaleString('fr-FR')} ${o.currency||'XPF'}</span></div>
      <div class="track-row"><span class="track-label">Statut</span><span class="track-val"><span class="status-badge s-${o.status}">${statusIcons[o.status]||''} ${statusLabels[o.status]||o.status}</span></span></div>
      <div class="track-row"><span class="track-label">Livraison</span><span class="track-val">${o.delivery?.type==='pickup'?'Retrait en boutique':'Livraison'}${o.delivery?.pickupDate?' · '+o.delivery.pickupDate:''}</span></div>`;
  } catch(e) { resultEl.innerHTML=`<div style="color:#ff6b6b;padding:14px;text-align:center;font-size:0.8rem">Erreur : ${e.message}</div>`; }
}

async function loadPlanning() {
  const ws = document.getElementById('workspace');
  ws.innerHTML = `<div class="planning-view"><div style="color:var(--text-secondary);font-size:0.85rem;padding:40px;text-align:center">Chargement du planning…</div></div>`;

    renderPlanning(orders);
  } catch(e) {
    ws.innerHTML = `<div class="planning-view"><div style="color:#ff6b6b;padding:40px;text-align:center">Erreur : ${e.message}</div></div>`;
  }
}

function renderPlanning(orders) {
  const ws = document.getElementById('workspace');
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = today.toISOString().slice(0,10);

  // Stats globales
  const total = orders.length;
  const totalAmt = orders.reduce((s,o) => s+(o.amount||0), 0);
  const todayOrders = orders.filter(o => {
    const d = o.delivery?.pickupDate || o.createdAt?.slice(0,10);
    return d === todayStr;
  });
  const pending = orders.filter(o => ['paid','pending','processing'].includes(o.status));

  // Grouper par date (pickupDate ou date de commande)
  const byDate = {};
  orders.forEach(o => {
    const key = o.delivery?.pickupDate || o.createdAt?.slice(0,10) || 'Sans date';
    if (!byDate[key]) byDate[key] = [];
    byDate[key].push(o);
  });

  // Trier les dates
  const sortedDates = Object.keys(byDate).sort((a,b) => {
    if (a === 'Sans date') return 1;
    if (b === 'Sans date') return -1;
    return new Date(a) - new Date(b);
  });

  const statusIcons = {pending:'⏳',paid:'✅',processing:'🔄',delivered:'📦',cancelled:'❌'};
  const statusLabels = {pending:'En attente',paid:'Payée',processing:'En cours',delivered:'Livrée',cancelled:'Annulée'};

  const daysHtml = sortedDates.map(dateKey => {
    const dayOrders = byDate[dateKey];
    let dateLabel = dateKey;
    let dateClass = '';
    if (dateKey !== 'Sans date') {
      const d = new Date(dateKey + 'T00:00:00');
      if (dateKey === todayStr) { dateLabel = "Aujourd'hui · " + d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'}); dateClass = 'today'; }
      else if (d < today) { dateLabel = '⚠️ ' + d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); dateClass = 'overdue'; }
      else dateLabel = d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    }
    const dayTotal = dayOrders.reduce((s,o) => s+(o.amount||0), 0);
    const doneCount = dayOrders.filter(o => o.status==='delivered').length;

    return `<div class="planning-day">
      <div class="planning-day-head" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
        <div class="planning-day-date ${dateClass}">${dateLabel}</div>
        <div class="planning-day-meta">
          <span>${dayOrders.length} commande${dayOrders.length>1?'s':''}</span>
          <span style="color:var(--accent-3)">${dayTotal.toLocaleString('fr-FR')} XPF</span>
          <span>${doneCount}/${dayOrders.length} livrées</span>
          <span style="color:var(--text-secondary);font-size:0.7rem">▼</span>
        </div>
      </div>
      <div class="planning-day-body">
        ${dayOrders.map(o => `
          <div class="planning-order-row">
            <span class="po-ref">${o.orderId}</span>
            <span class="po-client">${o.client?.name||'—'}</span>
            <span class="po-product">${o.product||'—'}</span>
            <span class="status-badge s-${o.status||'pending'}">${statusIcons[o.status]||''} ${statusLabels[o.status]||o.status}</span>
            <span class="po-amount">${(o.amount||0).toLocaleString('fr-FR')} XPF</span>
            <select class="status-select" style="font-size:0.68rem" onchange="updateOrderStatusPlanning('${o.orderId}',this.value)">
              <option value="">Changer</option>
              <option value="processing">🔄 En cours</option>
              <option value="delivered">📦 Livré/Remis</option>
              <option value="cancelled">❌ Annuler</option>
              <option value="archived">🗃️ Archiver</option>
            </select>
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');

  ws.innerHTML = `
    <div class="planning-view">
      <div class="orders-head">
        <div>
          <div class="orders-title">📅 Planning des commandes</div>
          <div style="font-size:0.7rem;color:var(--text-secondary);margin-top:2px">Organisé par date de retrait / livraison</div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-outline" style="font-size:0.72rem" onclick="loadPlanning()">🔄 Rafraîchir</button>
          <button class="btn btn-outline" style="font-size:0.72rem" onclick="showOrders()">📋 Vue tableau</button>
        </div>
      </div>
      <div class="planning-stats">
        <div class="pstat"><div class="pstat-val" style="color:var(--accent)">${total}</div><div class="pstat-label">Commandes actives</div></div>
        <div class="pstat"><div class="pstat-val" style="color:var(--accent-3)">${totalAmt.toLocaleString('fr-FR')} <span style="font-size:0.8rem">XPF</span></div><div class="pstat-label">CA total</div></div>
        <div class="pstat"><div class="pstat-val" style="color:#f6d365">${pending.length}</div><div class="pstat-label">À traiter</div></div>
        <div class="pstat"><div class="pstat-val" style="color:#4facfe">${todayOrders.length}</div><div class="pstat-label">Aujourd'hui</div></div>
      </div>
      ${sortedDates.length === 0
        ? `<div style="text-align:center;color:var(--text-secondary);padding:60px;font-size:0.85rem">Aucune commande active.</div>`
        : daysHtml}
    </div>`;
}

async function updateOrderStatusPlanning(orderId, status) {
  if (!status) return;
  try {
    if (status === 'archived') {
      await fetch(`${WORKER_BASE}/admin/db/archive`, {
        method:'POST',
        headers:{'Content-Type':'application/json','X-Admin-Secret':adminSecret},
        body:JSON.stringify({ orderId })
      });
    } else {
      await fetch(`${WORKER_BASE}/admin/db/order`, {
        method:'PATCH',
        headers:{'Content-Type':'application/json','X-Admin-Secret':adminSecret},
        body:JSON.stringify({ orderId, status })
      });
    }
    showToast(`✅ Commande ${orderId} → ${status}`);
    await loadPlanning();
  } catch(e) { showToast('❌ ' + e.message, true); }
}

// ═══════════════════════════════════════════════════════
// TOASTS & ALERTES
// ═══════════════════════════════════════════════════════
function showToast(msg, isAlert=false) {
  const container = document.getElementById('hcs-toast-container');
  const t = document.createElement('div');
  t.className = 'hcs-toast' + (isAlert ? ' alert' : '');
  t.textContent = msg;
  container.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

function requestNotifPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function sendBrowserNotif(title, body) {
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(title, { body, icon: 'https://hcstahiti.app/favicon.ico' });
  }
}

// ═══════════════════════════════════════════════════════
// POLLING — nouvelles commandes
// ═══════════════════════════════════════════════════════
let _pollKnownIds = null;
let _pollInterval = null;

function startOrderPolling() {
  if (_pollInterval) return;
  requestNotifPermission();
  _pollInterval = setInterval(async () => {
    if (!adminSecret) return;
    try {
      const res = await fetch(`${WORKER_BASE}/admin/db/orders?archived=0`, { headers:{'X-Admin-Secret':adminSecret} });
      if (!res.ok) return;
      const { orders } = await res.json();
      const active = orders;
      const ids = new Set(active.map(o => o.orderId));
      if (_pollKnownIds === null) { _pollKnownIds = ids; return; }
      const newOnes = [...ids].filter(id => !_pollKnownIds.has(id));
      if (newOnes.length > 0) {
        const n = newOnes.length;
        showToast(`🛎️ ${n} nouvelle${n>1?'s':''} commande${n>1?'s':''} reçue${n>1?'s':''}!`, true);
        sendBrowserNotif('HCS — Nouvelle commande 🛍️', `${n} nouvelle${n>1?'s':''} commande${n>1?'s':''}. Ouvrez le dashboard.`);
        // Badge nav
        const badge = document.getElementById('orders-badge');
        if (badge) { badge.textContent = newOnes.length; badge.style.display = 'inline'; }
        _pollKnownIds = ids;
        // Refresh si vue active
        const ws = document.getElementById('workspace');
        if (ws.querySelector('.orders-view')) loadOrders(false);
        if (ws.querySelector('.planning-view')) loadPlanning();
      }
    } catch(e) { /* silencieux */ }
  }, 90000); // toutes les 90s
}

// ═══════════════════════════════════════════════════════
// PERSISTANCE IMAGES (localStorage)
// ═══════════════════════════════════════════════════════
const IMG_STORE = 'hcs_img_v1';
const _memState = {}; // état en mémoire (switching rapide, pas de quota)

function saveState(id) {
  const cv = document.getElementById('cv-' + id);
  if (!cv) return; // DOM pas encore rendu

  // 1. Sauvegarder en mémoire (rapide, pas de quota)
  const bgStyle = cv.style.background || '';
  const logo = cv.querySelector('.logo-overlay');
  const c = CAMPS[id];
  _memState[id] = {
    bgUrl:  bgStyle.includes('url(') ? bgStyle : null,
    logo:   logo?.src || null,
    logoLeft: logo?.style.left || null,
    logoTop:  logo?.style.top  || null,
    prods: c.products.map((_, i) => {
      const el = document.getElementById(`lpimg-${id}-${i}`)?.querySelector('img');
      return el?.src || _memState[id]?.prods?.[i] || '';
    }),
    pzAmount: document.getElementById(`pz-amount-${id}`)?.value || '',
    pzWorker: document.getElementById(`pz-worker-${id}`)?.value || '',
    pzSecret: document.getElementById(`pz-secret-${id}`)?.value || '',
    pzMode:   document.getElementById(`pz-mode-${id}`)?.value   || 'TEST',
  };

  // 2. Persister dans localStorage (pour rechargement page)
  try {
    const all = JSON.parse(localStorage.getItem(IMG_STORE) || '{}');
    if (!all[id]) all[id] = {};
    if (logo?.src) all[id].logo = logo.src;
    all[id].prods = _memState[id].prods;
    localStorage.setItem(IMG_STORE, JSON.stringify(all));
  } catch(e) {
    console.warn('⚠️ localStorage plein — images non sauvegardées:', e.message);
  }
}

function saveBg(id, dataUrl) {
  // Le fond (bg) n'est pas persisté dans localStorage (trop lourd → quota dépassé).
  // Il est conservé en mémoire dans _memState[id].bgUrl pour le switching.
  if (!_memState[id]) _memState[id] = {};
  _memState[id].bgDataUrl = dataUrl;
}

function _attachLogoDrag(img) {
  let dx=0,dy=0,x=0,y=0;
  img.addEventListener('mousedown', ev2 => {
    ev2.stopPropagation(); x=ev2.clientX; y=ev2.clientY;
    document.onmousemove = em => { dx=x-em.clientX; dy=y-em.clientY; x=em.clientX; y=em.clientY; img.style.left=(img.offsetLeft-dx)+'px'; img.style.top=(img.offsetTop-dy)+'px'; img.style.bottom='auto'; img.style.right='auto'; };
    document.onmouseup = () => { document.onmousemove=null; document.onmouseup=null; };
  });
}

function restoreState(onlyId = null) {
  try {
    const lsAll = JSON.parse(localStorage.getItem(IMG_STORE) || '{}');
    const targets = onlyId !== null ? [CAMPS[onlyId]] : CAMPS;
    targets.forEach(c => {
      const id = c.id;
      // Mémoire vive en priorité (switching), puis localStorage (après rechargement)
      const mem  = _memState[id] || {};
      const saved = lsAll[id]   || {};

      const cv = document.getElementById('cv-' + id);
      if (!cv) return;

      // ── Fond vignette ──────────────────────────────────
      // Priorité : mémoire (bgUrl complet) → mémoire (bgDataUrl)
      const bgUrl = mem.bgUrl || (mem.bgDataUrl ? `url(${mem.bgDataUrl}) center/cover no-repeat` : null);
      if (bgUrl) {
        cv.style.background = bgUrl;
        const hint = cv.querySelector('.upload-hint');
        if (hint) hint.style.opacity = '0';
        const match = bgUrl.match(/url\(["']?([^"')]+)["']?\)/);
        const dataUrl = match ? match[1] : null;
        if (dataUrl) {
          const thumb   = document.getElementById('bg-thumb-' + id);
          const preview = document.getElementById('bg-preview-' + id);
          if (thumb)   thumb.src = dataUrl;
          if (preview) preview.style.display = 'block';
        }
        const lpHero = document.getElementById('lp-hero-' + id);
        if (lpHero) lpHero.style.background = bgUrl;
      }

      // ── Logo ───────────────────────────────────────────
      const logoSrc = mem.logo || saved.logo;
      if (logoSrc) {
        const old = cv.querySelector('.logo-overlay'); if (old) old.remove();
        const img = document.createElement('img');
        img.src = logoSrc; img.className = 'logo-overlay';
        img.style.cssText = 'position:absolute;bottom:10px;right:10px;width:64px;height:64px;object-fit:contain;z-index:5;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,0.5);cursor:move;';
        if (mem.logoLeft) { img.style.left = mem.logoLeft; img.style.right = 'auto'; }
        if (mem.logoTop)  { img.style.top  = mem.logoTop;  img.style.bottom = 'auto'; }
        cv.appendChild(img);
        _attachLogoDrag(img);
        const lpHero = document.getElementById('lp-hero-' + id);
        if (lpHero) {
          const oldLp = lpHero.querySelector('.lp-logo-overlay'); if (oldLp) oldLp.remove();
          const lpLogo = document.createElement('img');
          lpLogo.src = logoSrc; lpLogo.className = 'lp-logo-overlay';
          lpLogo.style.cssText = 'position:absolute;bottom:12px;right:12px;width:72px;height:72px;object-fit:contain;z-index:5;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,0.6);';
          lpHero.appendChild(lpLogo);
        }
      }

      // ── Images produits ────────────────────────────────
      const prods = mem.prods?.length ? mem.prods : (saved.prods || []);
      prods.forEach((src, i) => {
        if (!src) return;
        const lpImg = document.getElementById(`lpimg-${id}-${i}`);
        if (lpImg) lpImg.innerHTML = `<img src="${src}" style="width:100%;height:100%;object-fit:cover">`;
        // Logo-cell dans le panneau éditeur
        const cell = document.querySelector(`#pg-${id} .logo-cell:nth-child(${i+1})`);
        if (cell) cell.innerHTML = `<img src="${src}" style="width:100%;height:100%;object-fit:contain"><input type="file" id="pi-${id}-${i}" accept="image/*" style="display:none" onchange="loadProdImg(event,${id},${i})">`;
      });

      // ── Champs PayZen ──────────────────────────────────
      const amtEl  = document.getElementById(`pz-amount-${id}`);
      const wrkEl  = document.getElementById(`pz-worker-${id}`);
      const secEl  = document.getElementById(`pz-secret-${id}`);
      const modEl  = document.getElementById(`pz-mode-${id}`);
      if (amtEl && mem.pzAmount) amtEl.value  = mem.pzAmount;
      if (wrkEl && mem.pzWorker) wrkEl.value  = mem.pzWorker;
      if (secEl && mem.pzSecret) secEl.value  = mem.pzSecret;
      if (modEl && mem.pzMode)   modEl.value  = mem.pzMode;
    });
  } catch(e) { console.warn('Restore error:', e); }
}

// ─────────────────────────────────────────────────────────
// EXPORT PNG — Vignette Facebook
// ─────────────────────────────────────────────────────────
async function exportVignettePNG(id) {
  const c = CAMPS[id];
  const canvas = document.getElementById('cv-' + id);
  if (!canvas) { showToast('❌ Vignette introuvable', true); return; }

  const btn = document.getElementById('btn-png-' + id);
  if (btn) { btn.disabled = true; btn.textContent = '⏳…'; }
  showToast('⏳ Export PNG vignette…');

  if (!window.html2canvas) {
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      s.onload = resolve;
      s.onerror = () => reject(new Error('html2canvas indisponible'));
      document.head.appendChild(s);
    });
  }

  try {
    // Masquer temporairement le hint upload
    const hint = canvas.querySelector('.upload-hint');
    if (hint) hint.style.display = 'none';

    const snap = await html2canvas(canvas, {
      scale: 3,
      useCORS: true,
      allowTaint: true,
      backgroundColor: null,
      logging: false,
      width: canvas.offsetWidth,
      height: canvas.offsetHeight,
    });

    if (hint) hint.style.display = '';

    snap.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `vignette-fb-${id}-${c.name.replace(/[^\w]/g,'-').toLowerCase()}.png`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('✅ Vignette PNG téléchargée !');
    }, 'image/png');

  } catch(e) {
    showToast('❌ ' + e.message, true);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '🖼️ PNG'; }
  }
}

// ─────────────────────────────────────────────────────────
// EXPORT PNG — Landing Page
// ─────────────────────────────────────────────────────────
async function exportLPImage(id) {
  const c = CAMPS[id];
  const lpBody = document.querySelector('.lp-body');
  if (!lpBody) { showToast('❌ LP introuvable', true); return; }

  showToast('⏳ Génération PNG en cours…');
  const btn = document.querySelector(`button[onclick="exportLPImage(${id})"]`);
  if (btn) { btn.disabled = true; btn.textContent = '⏳ PNG…'; }

  // Charger html2canvas si pas déjà là
  if (!window.html2canvas) {
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      s.onload = resolve;
      s.onerror = () => reject(new Error('html2canvas non disponible'));
      document.head.appendChild(s);
    });
  }

  try {
    const canvas = await html2canvas(lpBody, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#0f0f1a',
      logging: false,
      width: lpBody.scrollWidth,
      height: lpBody.scrollHeight,
      windowWidth: lpBody.scrollWidth,
    });

    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `andromeda-lp-${id}-${c.name.replace(/[^\w]/g,'-').toLowerCase()}.png`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('✅ PNG téléchargé !');
    }, 'image/png');

  } catch(e) {
    showToast('❌ Erreur PNG : ' + e.message, true);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '🖼️ Exporter PNG'; }
  }
}

render(0);
restoreState(0);
startOrderPolling();
